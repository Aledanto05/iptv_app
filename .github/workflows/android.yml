name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: m3u-iptv-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # genera automaticamente gradlew (visto che non lo hai nel progetto)
      - name: Generate Gradle wrapper
        run: gradle wrapper

      # build APK
      - name: Build debug APK
        run: ./gradlew assembleDebug

      # carica APK come download
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: m3u-iptv-native/app/build/outputs/apk/debug/app-debug.apk
